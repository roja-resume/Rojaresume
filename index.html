<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Portfolio</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Create 3D scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas') });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Create rotating monitor
        const geometry = new THREE.BoxGeometry(1, 0.75, 0.1);
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const monitor = new THREE.Mesh(geometry, material);
        scene.add(monitor);

        // Camera settings
        camera.position.z = 5;

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            monitor.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        // Add resume download functionality
        const downloadLink = document.createElement('a');
        downloadLink.href = 'path_to_resume.pdf';
        downloadLink.innerText = 'Download Resume';
        document.body.appendChild(downloadLink);

        // Handle responsive design
        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
