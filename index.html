<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Portfolio</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #container { position: absolute; width: 100%; height: 100%; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; color: white; }
        nav { background: rgba(0, 0, 0, 0.5); padding: 10px; }
        .skills, .projects, .contact { margin: 20px; }
        #statsGrid { display: flex; justify-content: space-around; }
        #heroText { position: absolute; left: 20px; top: 20px; font-size: 24px; }
        /* Additional styles for UI and accents */
        .accent { color: cyan; }
    </style>
</head>
<body>
    <div id="container"></div>
    <div class="overlay">
        <nav>Portfolio Navigation</nav>
        <div id="statsGrid">
            <div><span class="accent">Skills</span></div>
            <div><span class="accent">Projects</span></div>
            <div><span class="accent">Contact</span></div>
        </div>
        <div id="heroText">Welcome to My Professional 3D Portfolio</div>
    </div>
    <script src="https://threejs.org/build/three.js"></script>
    <script>
        // Three.js code for 3D scene and canvas
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        // Monitor geometry and material
        const monitorGeometry = new THREE.BoxGeometry(1, 1, 0.1);
        const monitorMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const monitor = new THREE.Mesh(monitorGeometry, monitorMaterial);
        scene.add(monitor);

        // Rotating monitor
        function animate() {
            requestAnimationFrame(animate);
            monitor.rotation.y += 0.01; // Adjust rotation speed
            renderer.render(scene, camera);
        }
        animate();

        // Implementing particle network and other features...
        // Dynamically update monitor content and add interactive elements

        // Control settings for auto-rotation and manual mouse control
        let isMouseControl = true;
        window.addEventListener('mousemove', function(event) {
            if(isMouseControl) {
                monitor.rotation.y = (event.clientX / window.innerWidth) * Math.PI;
                monitor.rotation.x = (event.clientY / window.innerHeight) * Math.PI;
            }
        });

        // Resume download feature
        const resumeLink = document.createElement('a');
        resumeLink.href = 'path/to/resume.pdf';
        resumeLink.innerText = 'Download Resume';
        document.body.appendChild(resumeLink);

    </script>
</body>
</html>
